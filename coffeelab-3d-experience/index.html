<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoffeeLab 3D Experience</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sodo+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar navbar-expand-lg">
                <a class="navbar-brand" href="index.html">
                    <div class="logo">
                        <span class="logo-text">CoffeeLab</span>
                        <span class="logo-subtitle">3D Experience</span>
                    </div>
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <nav class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link active" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                        <li class="nav-item"><a class="nav-link" href="submission.html">Submission</a></li>
                    </ul>
                </nav>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <div class="container-fluid">
            <div class="row">

                <div class="col-lg-8">
                    <div class="product-info-compact">
                        <div id="product-description"></div>
                    </div>

                    <div class="viewer-container">
                        <div id="canvas-container"></div>
                        <div id="loading" class="loading-overlay">
                            <div class="spinner"></div>
                            <p>Loading model...</p>
                        </div>
                    </div>

                    <div class="viewer-bottom-bar">
                        <div id="model-selector" class="model-selector model-selector-row"></div>
                    </div>

                    <div class="timeline-bar">
                        <button id="play-pause-btn" class="timeline-play-btn" title="Play / Pause animation">
                            <span id="play-icon"></span>
                            <span id="play-label">Brew Coffee</span>
                        </button>
                        <input type="range" id="animation-timeline" class="timeline-slider" min="0" max="100" step="0.5" value="0">
                        <span id="timeline-label" class="timeline-label">0%</span>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="controls-panel">

                        <section class="control-panel-section">
                            <h3 class="control-panel-title">Camera &amp; View</h3>
                            <div class="control-group control-group-4">
                                <button id="cam-front-btn" class="control-btn">Front</button>
                                <button id="cam-top-btn" class="control-btn">Top</button>
                                <button id="cam-side-btn" class="control-btn">Side</button>
                                <button id="cam-detail-btn" class="control-btn">Detail</button>
                            </div>
                            <div class="control-group">
                                <button id="wireframe-btn" class="control-btn">Wireframe</button>
                                <button id="animate-btn" class="control-btn">Animate</button>
                            </div>
                        </section>

                        <section class="control-panel-section">
                            <h3 class="control-panel-title">Lighting</h3>
                            <div class="control-group">
                                <button id="light-ambient-btn" class="control-btn active">Ambient</button>
                                <button id="cinematic-btn" class="control-btn" title="Custom GLSL shader effect">Cinematic Mode</button>
                            </div>
                            <div class="slider-group">
                                <label for="light-intensity">Intensity <span id="intensity-value">1.0</span></label>
                                <input type="range" id="light-intensity" min="0" max="2" step="0.1" value="1">
                            </div>
                        </section>

                        <section class="control-panel-section">
                            <h3 class="control-panel-title">Colour &amp; Material</h3>
                            <p class="hint-text">Pick a colour:</p>
                            <div id="color-swatches" class="swatch-row"></div>
                            <p class="hint-text">Surface:</p>
                            <div id="finish-buttons" class="control-group"></div>
                        </section>

                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 CoffeeLab 3D Experience | Web 3D Applications module</p>
        </div>
    </footer>

    <audio id="audio-cafe" src="audio/cafe-ambience.mp3" preload="none" loop></audio>
    <audio id="audio-brewing" src="audio/brewing.mp3" preload="none"></audio>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
